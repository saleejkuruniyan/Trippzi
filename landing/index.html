    <style>
        :root {
            --primary: #DC0000;
            --background: #faf9f6;
            --foreground: #1c1917;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #0c0a09;
                --foreground: #f5f5f4;
                --glass: rgba(12, 10, 9, 0.7);
                --glass-border: rgba(255, 255, 255, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Baloo 2', cursive;
            background-color: var(--background);
            color: var(--foreground);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('bg.png') no-repeat center center/cover;
            filter: brightness(0.7);
            transform: scale(1.1);
            animation: panBg 20s infinite alternate linear;
        }

        @keyframes panBg {
            from {
                transform: scale(1.1) translate(0, 0);
            }

            to {
                transform: scale(1.2) translate(-2%, -2%);
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: -1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            animation: fadeIn 1.2s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 220px;
            margin-bottom: 2.5rem;
            filter: brightness(0) saturate(100%) invert(11%) sepia(93%) saturate(6747%) hue-rotate(2deg) brightness(96%) contrast(115%);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            color: var(--foreground);
        }

        p.tagline {
            font-family: 'Lora', serif;
            font-size: 1.15rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
            font-style: italic;
            line-height: 1.6;
        }

        .status-badge {
            background: var(--primary);
            color: white;
            padding: 0.75rem 2.5rem;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 4px 15px rgba(220, 0, 0, 0.4);
            margin-top: 2rem;
            cursor: default;
        }

        .form-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--foreground);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-notify {
            padding: 1rem 2rem;
            border-radius: 16px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(220, 0, 0, 0.2);
            white-space: nowrap;
        }

        .btn-notify:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(220, 0, 0, 0.3);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
        }

        .socials a {
            color: var(--foreground);
            text-decoration: none;
            opacity: 0.8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .socials a:hover {
            opacity: 1;
            color: var(--primary);
            transform: translateY(-3px);
        }

        .socials a i,
        .socials a svg {
            width: 24px;
            height: 24px;
        }

        .socials a span {
            font-size: 0.75rem;
            font-weight: 700;
        }

        .success-message {
            display: none;
            color: #15803d;
            font-weight: 600;
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        .footer-text {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.6;
            color: var(--foreground);
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .card {
                padding: 2rem 1.5rem;
                border-radius: 24px;
            }

            h1 {
                font-size: 2.25rem;
            }

            .logo {
                width: 160px;
                margin-bottom: 2rem;
            }

            .form-group {
                flex-direction: column;
            }

            input,
            .btn-notify {
                width: 100%;
            }

            .socials {
                gap: 1.5rem;
            }
        }

        @media (min-width: 768px) {
            .card {
                max-width: 600px;
                padding: 4rem;
            }
        }
    </style>
</head>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Handle form submission
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxgYL-5mFkbzLNDtZGd7QS05DYIQAniChIBDAfCD3Hyg4TikjWeAuqLYJZ65vS9FG3Adg/exec';
        const form = document.getElementById('notify-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMsg = document.getElementById('success');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address (e.g., name@domain.com)');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'SENDING...';

            fetch(scriptURL, {
                method: 'POST',
                body: new FormData(form),
                mode: 'no-cors' // Google Script requires this for cross-domain POST without preflight
            })
                .then(response => {
                    form.style.display = 'none';
                    successMsg.style.display = 'block';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    // Even if there's an error, we show success in this demo or handle it
                    form.style.display = 'none';
                    successMsg.style.display = 'block';
                });
        });
    </script>
