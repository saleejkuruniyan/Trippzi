apiVersion: apps/v1
kind: Deployment
metadata:
  name: trippzi-beat
  namespace: trippzi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trippzi-beat
  template:
    metadata:
      labels:
        app: trippzi-beat
    spec:
      containers:
      - name: beat
        image: trippzi-backend:latest
        command: ["/opt/venv/bin/celery", "-A", "core", "beat", "--loglevel=info"]
        envFrom:
        - secretRef:
            name: trippzi-secrets
        env:
        - name: CELERY_BROKER_URL
          value: redis://redis-service:6379/0
